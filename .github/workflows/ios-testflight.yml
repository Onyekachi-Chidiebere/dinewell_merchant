name: iOS Build & Deploy (TestFlight)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

env:
  IOS_WORKSPACE: ios/DineWellMerchant.xcworkspace
  IOS_SCHEME: DineWellMerchant
  IOS_BUNDLE_ID: org.dinewell.DineWellMerchant
  IOS_TEAM_ID: KB8PK63CSQ
  IOS_CODE_SIGN_IDENTITY: iPhone Distribution

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install JS dependencies
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Build JS bundle for iOS
        run: yarn build-ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_P12_PASSWORD }}

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PP_PATH="$RUNNER_TEMP/build_profile.mobileprovision"
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Archive iOS app
        env:
          IOS_PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          set -euo pipefail
          mkdir -p build

          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "build/${IOS_SCHEME}.xcarchive" \
            CODE_SIGN_IDENTITY="$IOS_CODE_SIGN_IDENTITY" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_SPECIFIER" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            archive

      - name: Export IPA for TestFlight
        env:
          IOS_PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          set -euo pipefail

          mkdir -p build/export

          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>compileBitcode</key>
            <false/>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${IOS_PROVISIONING_PROFILE_SPECIFIER}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "build/${IOS_SCHEME}.xcarchive" \
            -exportPath "build/export" \
            -exportOptionsPlist "build/ExportOptions.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: ios-ipa
          path: build/export/*.ipa

      - name: Upload to TestFlight
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          ipa_files=(build/export/*.ipa)
          if [ ${#ipa_files[@]} -eq 0 ]; then
            echo "No IPA found in build/export"
            exit 1
          fi
          echo "IPA_PATH=${ipa_files[0]}" >> "$GITHUB_ENV"

      - name: Upload app to TestFlight
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: apple-actions/upload-testflight-build@v4
        with:
          app-path: ${{ env.IPA_PATH }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

