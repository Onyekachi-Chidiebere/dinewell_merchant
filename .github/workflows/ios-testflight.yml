name: iOS Build & Deploy (TestFlight)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

env:
  IOS_WORKSPACE: ios/DineWellMerchant.xcworkspace
  IOS_SCHEME: DineWellMerchant
  IOS_BUNDLE_ID: org.dinewell.DineWellMerchant
  IOS_TEAM_ID: KB8PK63CSQ
  IOS_CODE_SIGN_IDENTITY: Apple Distribution

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install JS dependencies
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Build JS bundle for iOS
        run: yarn build-ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_P12_PASSWORD }}

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PP_PATH="$RUNNER_TEMP/build_profile.mobileprovision"
          PP_PLIST="$RUNNER_TEMP/profile.plist"
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | tr -d '[:space:]' | base64 --decode -o "$PP_PATH"
          security cms -D -i "$PP_PATH" > "$PP_PLIST"

          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PP_PLIST")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PP_PLIST")
          PP_APP_ID=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$PP_PLIST")

          if /usr/libexec/PlistBuddy -c "Print ApplicationIdentifierPrefix" "$PP_PLIST" >/dev/null 2>&1; then
            PP_TEAM=$(/usr/libexec/PlistBuddy -c "Print ApplicationIdentifierPrefix:0" "$PP_PLIST")
          elif /usr/libexec/PlistBuddy -c "Print TeamIdentifier" "$PP_PLIST" >/dev/null 2>&1; then
            PP_TEAM=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$PP_PLIST")
          else
            PP_TEAM="${PP_APP_ID%%.*}"
          fi

          PP_BUNDLE_ID="${PP_APP_ID#${PP_TEAM}.}"

          echo "Installed profile name: $PP_NAME"
          echo "Installed profile UUID: $PP_UUID"
          echo "Profile team ID: $PP_TEAM"
          echo "Profile app identifier: $PP_APP_ID"
          echo "Profile bundle ID: $PP_BUNDLE_ID"

          if [ "$PP_TEAM" != "$IOS_TEAM_ID" ]; then
            echo "Profile team ($PP_TEAM) does not match IOS_TEAM_ID ($IOS_TEAM_ID)"
            exit 1
          fi

          if [ "$PP_BUNDLE_ID" != "$IOS_BUNDLE_ID" ]; then
            echo "Profile bundle ($PP_BUNDLE_ID) does not match IOS_BUNDLE_ID ($IOS_BUNDLE_ID)"
            exit 1
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${PP_UUID}.mobileprovision"

          echo "IOS_PROFILE_UUID=$PP_UUID" >> "$GITHUB_ENV"
          echo "IOS_PROFILE_NAME=$PP_NAME" >> "$GITHUB_ENV"

      - name: Verify code signing setup
        run: |
          set -euo pipefail
          echo "Xcode: $(xcodebuild -version | tr '\n' ' ')"
          echo "Installed provisioning profiles:"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles" || true
          echo "Available signing identities:"
          security find-identity -v -p codesigning

      - name: Archive iOS app
        run: |
          set -euo pipefail
          mkdir -p build

          set +e
          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "build/${IOS_SCHEME}.xcarchive" \
            -resultBundlePath "build/Archive.xcresult" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$IOS_CODE_SIGN_IDENTITY" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PROVISIONING_PROFILE="$IOS_PROFILE_UUID" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            archive 2>&1 | tee build/archive.log
          ARCHIVE_STATUS=${PIPESTATUS[0]}
          set -e

          if [ "$ARCHIVE_STATUS" -ne 0 ]; then
            echo "::group::Archive errors"
            grep -E "error:|ARCHIVE FAILED|Code Sign error|No profile|signing" build/archive.log || tail -n 80 build/archive.log
            echo "::endgroup::"
            exit "$ARCHIVE_STATUS"
          fi

      - name: Export IPA for TestFlight
        run: |
          set -euo pipefail

          mkdir -p build/export

          rm -f build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :method string app-store" build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string ${IOS_TEAM_ID}" build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :compileBitcode bool false" build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:${IOS_BUNDLE_ID} string ${IOS_PROFILE_UUID}" build/ExportOptions.plist

          set +e
          xcodebuild \
            -exportArchive \
            -archivePath "build/${IOS_SCHEME}.xcarchive" \
            -exportPath "build/export" \
            -exportOptionsPlist build/ExportOptions.plist \
            2>&1 | tee build/export.log
          EXPORT_STATUS=${PIPESTATUS[0]}
          set -e

          if [ "$EXPORT_STATUS" -ne 0 ]; then
            echo "::group::Export errors"
            grep -E "error:|EXPORT FAILED|signing|profile" build/export.log || tail -n 80 build/export.log
            echo "::endgroup::"
            exit "$EXPORT_STATUS"
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: ios-ipa
          path: build/export/*.ipa

      - name: Upload to TestFlight
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          ipa_files=(build/export/*.ipa)
          if [ ${#ipa_files[@]} -eq 0 ]; then
            echo "No IPA found in build/export"
            exit 1
          fi
          echo "IPA_PATH=${ipa_files[0]}" >> "$GITHUB_ENV"

      - name: Prepare App Store Connect API key
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        id: asc_api_key
        env:
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          APPSTORE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPSTORE_API_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"

          if [ -n "${APPSTORE_API_PRIVATE_KEY_BASE64:-}" ]; then
            echo -n "$APPSTORE_API_PRIVATE_KEY_BASE64" | tr -d '[:space:]' | base64 --decode > "$KEY_PATH"
          elif [[ "${APPSTORE_API_PRIVATE_KEY:-}" == *"BEGIN PRIVATE KEY"* ]]; then
            if [[ "$APPSTORE_API_PRIVATE_KEY" == *'\\n'* ]]; then
              printf '%b\n' "$APPSTORE_API_PRIVATE_KEY" > "$KEY_PATH"
            else
              printf '%s\n' "$APPSTORE_API_PRIVATE_KEY" > "$KEY_PATH"
            fi
          else
            echo "APPSTORE_API_PRIVATE_KEY is missing or invalid."
            echo "Paste the full AuthKey_XXXX.p8 contents, or set APPSTORE_API_PRIVATE_KEY_BASE64 instead."
            exit 1
          fi

          openssl pkey -in "$KEY_PATH" -noout >/dev/null

          {
            echo 'content<<P8EOF'
            cat "$KEY_PATH"
            echo P8EOF
          } >> "$GITHUB_OUTPUT"

      - name: Upload app to TestFlight
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: apple-actions/upload-testflight-build@v4
        with:
          app-path: ${{ env.IPA_PATH }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ steps.asc_api_key.outputs.content }}

