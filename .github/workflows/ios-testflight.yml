name: iOS Build & Deploy (TestFlight)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

env:
  IOS_WORKSPACE: ios/DineWellMerchant.xcworkspace
  IOS_SCHEME: DineWellMerchant
  IOS_BUNDLE_ID: org.dinewell.DineWellMerchant
  IOS_TEAM_ID: KB8PK63CSQ
  IOS_CODE_SIGN_IDENTITY: Apple Distribution

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install JS dependencies
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Build JS bundle for iOS
        run: yarn build-ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_P12_PASSWORD }}

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PP_PATH="$RUNNER_TEMP/build_profile.mobileprovision"
          PP_PLIST="$RUNNER_TEMP/profile.plist"
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          security cms -D -i "$PP_PATH" > "$PP_PLIST"

          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PP_PLIST")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PP_PLIST")
          PP_TEAM=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier.0" "$PP_PLIST")
          PP_APP_ID=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$PP_PLIST")

          echo "Installed profile name: $PP_NAME"
          echo "Installed profile UUID: $PP_UUID"
          echo "Profile team ID: $PP_TEAM"
          echo "Profile app identifier: $PP_APP_ID"

          if [ "$PP_TEAM" != "$IOS_TEAM_ID" ]; then
            echo "Profile team ($PP_TEAM) does not match IOS_TEAM_ID ($IOS_TEAM_ID)"
            exit 1
          fi

          if [[ "$PP_APP_ID" != *".$IOS_BUNDLE_ID" ]]; then
            echo "Profile bundle ($PP_APP_ID) does not match IOS_BUNDLE_ID ($IOS_BUNDLE_ID)"
            exit 1
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${PP_UUID}.mobileprovision"

          echo "IOS_PROFILE_UUID=$PP_UUID" >> "$GITHUB_ENV"
          echo "IOS_PROFILE_NAME=$PP_NAME" >> "$GITHUB_ENV"

      - name: Archive iOS app
        run: |
          set -euo pipefail
          mkdir -p build

          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "build/${IOS_SCHEME}.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$IOS_CODE_SIGN_IDENTITY" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PROVISIONING_PROFILE="$IOS_PROFILE_UUID" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            archive

      - name: Export IPA for TestFlight
        run: |
          set -euo pipefail

          mkdir -p build/export

          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>compileBitcode</key>
            <false/>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${IOS_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "build/${IOS_SCHEME}.xcarchive" \
            -exportPath "build/export" \
            -exportOptionsPlist "build/ExportOptions.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: ios-ipa
          path: build/export/*.ipa

      - name: Upload to TestFlight
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          ipa_files=(build/export/*.ipa)
          if [ ${#ipa_files[@]} -eq 0 ]; then
            echo "No IPA found in build/export"
            exit 1
          fi
          echo "IPA_PATH=${ipa_files[0]}" >> "$GITHUB_ENV"

      - name: Upload app to TestFlight
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: apple-actions/upload-testflight-build@v4
        with:
          app-path: ${{ env.IPA_PATH }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

